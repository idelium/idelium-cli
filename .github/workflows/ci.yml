name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            setup.py

      - name: Install package and quality tools
        run: |
          python -m pip install --upgrade pip 'setuptools>=83,<84'
          python -m pip install -e '.[dev,test]'

      - name: Audit installed dependencies
        run: python -m pip_audit

      - name: Lint
        run: ruff check src tests

      - name: Check formatting
        run: ruff format --check src/idelium/_internal/commons/connection.py src/idelium/_internal/thirdparties/ideliumpostman.py tests

      - name: Type check maintained transport modules
        run: mypy --allow-untyped-defs --allow-any-generics --disable-error-code var-annotated src/idelium/_internal/commons/connection.py src/idelium/_internal/thirdparties/ideliumpostman.py

      - name: Run network-free tests with coverage
        run: |
          coverage run --source=src/idelium -m unittest discover -s tests
          coverage report --fail-under=27
          coverage xml -o coverage.xml

      - name: Build package
        run: |
          check-manifest
          python -m build

      - name: Verify wheel installation and CLI help
        run: |
          python -m pip install --force-reinstall --no-deps dist/*.whl
          python -c "import idelium"
          idelium --help

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-python-${{ matrix.python-version }}
          path: coverage.xml
